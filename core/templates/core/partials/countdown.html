<section class="countdown">
  <div class="countdown__container">
    <h2 class="countdown__title">Contagem Regressiva para a FSAE 2026</h2>

    <div
      class="countdown__timer"
      id="competition-timer"
      data-target="2026-11-01T08:00:00"
    >
      <div class="countdown__block">
        <span class="countdown__value" id="cd-days">00</span>
        <span class="countdown__label">Dias</span>
      </div>

      <span class="countdown__separator">:</span>

      <div class="countdown__block">
        <span class="countdown__value" id="cd-hours">00</span>
        <span class="countdown__label">Horas</span>
      </div>

      <span class="countdown__separator">:</span>

      <div class="countdown__block">
        <span class="countdown__value" id="cd-minutes">00</span>
        <span class="countdown__label">Minutos</span>
      </div>

      <span class="countdown__separator">:</span>

      <div class="countdown__block">
        <span class="countdown__value" id="cd-seconds">00</span>
        <span class="countdown__label">Segundos</span>
      </div>
    </div>
  </div>
</section>
