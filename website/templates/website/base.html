{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Formula SAE UFERSA - Electric Racing Team{% endblock %}</title>
    
    <link rel="stylesheet" href="{% static 'website/css/style.css' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    {% block extra_css %}{% endblock %}
</head>
<body>
    
    {% include 'website/partials/header.html' %}

    <main>
        {% block content %}
        {% endblock %}
    </main>

    {% include 'website/partials/footer.html' %}
    
    <script src="{% static 'website/js/cursor.js' %}"></script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
